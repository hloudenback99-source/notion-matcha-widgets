<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Notion Matcha Calendar</title>
<style>

:root{
  --card:#EFF5EE;
  --line:#789786;
  --text:#668B78;
  --text-dark:#557963;
  --soft:#dfe9df;
}
*{box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  background:transparent;
  overflow:hidden;
}
body{
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
}
.widget-card{
  width:100vw;
  height:100vh;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.widget-card{
  padding:6.5% 5%;
}
.calendar{
  width:min(100%, 486px);
  height:min(100%, 302px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  transform:translateY(0px);
}
.header{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:22px;
  margin-top:5px;
  margin-bottom:12px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  color:#5f8872;
  font-weight:700;
  font-size:clamp(17px, 4.2vw, 24px);
  line-height:1;
}
.chev{
  font-size:24px;
  font-weight:400;
  color:#759780;
  transform:translateY(-1px);
}
.controls{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  margin-bottom:14px;
}
.btn, .mode{
  height:36px;
  border:1.6px solid #759780;
  color:#648974;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  font-weight:500;
}
.btn{
  min-width:40px;
  padding:0 12px;
  font-size:20px;
}
.today{
  min-width:69px;
  font-size:14px;
}
.mode{
  width:32px;
  font-size:14px;
}
.grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  border-top:1.7px solid #739580;
  border-left:1.7px solid #739580;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
.cell{
  height:48px;
  border-right:1.7px solid #739580;
  border-bottom:1.7px solid #739580;
  display:flex;
  align-items:flex-start;
  justify-content:flex-end;
  padding:7px 8px 0 0;
  font-size:15px;
  font-weight:400;
  color:#668b78;
  position:relative;
}
.dow{
  height:29px;
  align-items:center;
  justify-content:center;
  padding:0;
  font-size:14px;
  font-weight:700;
  color:#5d806b;
}
.muted{
  color:#829b8e;
}
.highlight{
  color:#fff;
  z-index:1;
  font-weight:700;
}
.highlight::before{
  content:"";
  position:absolute;
  right:4px;
  top:4px;
  width:29px;
  height:29px;
  border-radius:50%;
  background:#7cc22b;
  z-index:-1;
}
@media(max-height:300px){
  .widget-card{padding:4%}
  .header{margin-bottom:9px}
  .controls{margin-bottom:10px}
  .cell{height:38px}
  .dow{height:26px}
}
</style>
</head>
<body>
  <main class="widget-card" aria-label="September 2024 calendar widget">
    <section class="calendar">
      <div class="header">
        <span id="monthName">September</span>
        <span class="chev">‹</span>
        <span id="yearNum">2024</span>
        <span class="chev">›</span>
      </div>
      <div class="controls">
        <div class="btn">‹</div>
        <div class="btn today">Today</div>
        <div class="btn">›</div>
        <div class="mode">M</div>
        <div class="mode">W</div>
        <div class="mode">D</div>
        <div class="mode">A</div>
      </div>
      <div id="grid" class="grid"></div>
    </section>
  </main>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const exact = params.get("mode") !== "current"; // default stays locked to screenshot: September 2024.
  const now = new Date();
  const year = exact ? Number(params.get("year") || 2024) : now.getFullYear();
  const month = exact ? Number(params.get("month") || 9) : now.getMonth() + 1;
  const highlight = exact ? Number(params.get("highlight") || 14) : now.getDate();

  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  document.getElementById("monthName").textContent = monthNames[month-1];
  document.getElementById("yearNum").textContent = String(year);

  const grid = document.getElementById("grid");
  const dows = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  dows.forEach(d => {
    const el = document.createElement("div");
    el.className = "cell dow";
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDow = new Date(year, month-1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const prevDays = new Date(year, month-1, 0).getDate();
  const cells = [];
  for(let i=0;i<42;i++){
    let value, muted=false;
    if(i < firstDow){
      value = prevDays - firstDow + i + 1;
      muted = true;
    } else if(i >= firstDow + daysInMonth){
      value = i - (firstDow + daysInMonth) + 1;
      muted = true;
    } else {
      value = i - firstDow + 1;
    }
    cells.push({value, muted});
  }

  // The screenshot only shows five weeks for September 2024.
  const visible = (exact && year === 2024 && month === 9) ? cells.slice(0,35) : cells.slice(0,35);

  visible.forEach(c => {
    const el = document.createElement("div");
    el.className = "cell" + (c.muted ? " muted" : "") + (!c.muted && c.value === highlight ? " highlight" : "");
    el.textContent = String(c.value).padStart(2, "0");
    grid.appendChild(el);
  });
})();
</script>
</body>
</html>
